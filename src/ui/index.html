<!doctype html>
<html>
	<head>
		<title>SkyPath - Static Version</title>
		<link rel="stylesheet" href="styles.css" />
		<link
			rel="stylesheet"
			href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
			integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
			crossorigin=""
		/>
	</head>

	<body>
		<header>
			<div class="logo">
				<div class="solari-board" id="solari-logo"></div>
			</div>
			<div class="stats">
				<div>
					<span id="airport-count">-</span>
					<p>AIRPORTS</p>
				</div>
			</div>
		</header>

		<div class="app">
			<!-- Sidebar -->
			<div class="sidebar">
				<p class="section-label">// ROUTE SEARCH</p>

				<div id="location-search">
					<div class="field-wrapper" id="origin-wrapper">
						<label for="origin">ORIGIN</label>
						<div
							class="field-input-box searchable-airport"
							id="origin-searchable"
						>
							<input
								type="text"
								id="origin"
								class="airport-search-input"
								placeholder="Search airport code, country, or name..."
								autocomplete="off"
							/>
							<span hidden class="dropdown-clear">❌</span>
							<div
								class="airport-options"
								id="origin-options"
								hidden
							></div>
						</div>
					</div>

					<div id="swap">
						<span class="swap-divider">--------</span>
						<button
							id="swap-button"
							class="action-button action-button-compact"
							type="button"
						>
							⇄ SWAP
						</button>
						<span class="swap-divider">--------</span>
					</div>

					<div class="field-wrapper" id="destination-wrapper">
						<label for="destination">DESTINATION</label>
						<div
							class="field-input-box searchable-airport"
							id="destination-searchable"
						>
							<input
								type="text"
								id="destination"
								class="airport-search-input"
								placeholder="Search airport code, country, or name..."
								autocomplete="off"
							/>
							<span hidden class="dropdown-clear">❌</span>
							<div
								class="airport-options"
								id="destination-options"
								hidden
							></div>
						</div>
					</div>
				</div>

				<p class="section-label">// TRIP DETAILS</p>

				<div id="trip-details">
					<div class="field-wrapper">
						<label for="trip-type">TRIP TYPE</label>
						<select id="trip-type" class="form-select">
							<option value="oneway">One-Way</option>
							<option value="return">Return</option>
						</select>
					</div>

					<div class="field-wrapper">
						<label for="departure-date">DEPARTURE</label>
						<input type="date" id="departure-date" class="form-input" />
					</div>

					<div class="field-wrapper" id="return-date-wrapper" style="display: none;">
						<label for="return-date">RETURN</label>
						<input type="date" id="return-date" class="form-input" />
					</div>

					<div class="field-wrapper">
						<label for="cabin-class">CABIN CLASS</label>
						<select id="cabin-class" class="form-select">
							<option value="economy">Economy</option>
							<option value="premium_economy">Premium Economy</option>
							<option value="business">Business</option>
							<option value="first">First Class</option>
						</select>
					</div>
				</div>

				<p class="section-label">// OPTIMISE BY</p>

				<div id="filter">
					<div id="filter-options">
						<div class="filter-col">
							<button
								class="filter-option"
								type="button"
								data-filter="shortest"
								aria-pressed="false"
							>
								<p>SHORTEST</p>
								<p>DISTANCE</p>
							</button>
							<button
								class="filter-option"
								type="button"
								data-filter="cheapest"
								aria-pressed="false"
							>
								<p>LOWEST</p>
								<p>PRICE</p>
							</button>
						</div>
						<div class="filter-col">
							<button
								class="filter-option"
								type="button"
								data-filter="fastest"
								aria-pressed="false"
							>
								<p>FASTEST</p>
								<p>TIME</p>
							</button>
							<button
								class="filter-option"
								type="button"
								data-filter="fewest_stops"
								aria-pressed="false"
							>
								<p>FEWEST</p>
								<p>STOPS</p>
							</button>
						</div>
					</div>
				</div>

				<button
					id="find-routes-button"
					class="action-button"
					type="button"
				>
					Find Routes
				</button>
			</div>

			<div class="map-area">
				<div id="map"></div>
			</div>
		</div>

		<!-- Placeholder route options - to be dynamically generated based on search results -->
		<section class="route-bar" aria-label="Available routes">
			<p class="route-bar-title">Choose a route</p>
			<div class="route-bar-list" role="group" aria-label="Route options">
				<button
					class="route-option active"
					type="button"
					data-route-option="route_1"
					aria-pressed="true"
				>
					<span class="route-option-name">Route 1</span>
					<span class="route-option-detail">-</span>
					<span class="route-option-detail">-</span>
				</button>
				<button
					class="route-option"
					type="button"
					data-route-option="route_2"
					aria-pressed="false"
				>
					<span class="route-option-name">Route 2</span>
					<span class="route-option-detail">-</span>
					<span class="route-option-detail">-</span>
				</button>
				<button
					class="route-option"
					type="button"
					data-route-option="route_3"
					aria-pressed="false"
				>
					<span class="route-option-name">Route 3</span>
					<span class="route-option-detail">-</span>
					<span class="route-option-detail">-</span>
				</button>
				<button
					class="route-option"
					type="button"
					data-route-option="route_4"
					aria-pressed="false"
				>
					<span class="route-option-name">Route 4</span>
					<span class="route-option-detail">-</span>
					<span class="route-option-detail">-</span>
				</button>
			</div>
			<div id="route-pagination">
					<button id="prev-page" class="page-btn" style="display: none;" >&lt;</button>
					<span id="page-info">1</span>
					<button id="next-page" class="page-btn" style="display: none;" >&gt;</button>
				</div>
		</section>

		<section class="route-text-panel" aria-label="Text route details">
			<p class="route-text-title">Route details</p>
			<pre id="route-details" class="route-details">Select a route, then press Find Routes</pre>
		</section>

		<script
			src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
			integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
			crossorigin=""
		></script>
		<script src="script.js"></script>
	</body>
</html>
